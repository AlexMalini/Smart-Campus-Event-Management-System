<!DOCTYPE html>
<html>
<head>
<title>Available Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-primary text-center">
📅 Available Events
</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Event Name</th>
<th>Type</th>
<th>Date</th>
<th>Venue</th>
<th>Organizer</th>
<th>Registration Fee</th>
<th>Participants</th>
<th>Register</th>

</tr>

</thead>

<tbody>

{% for event in events %}

<tr>

<td>{{ event[1] }}</td>
<td>{{ event[5] }}</td>
<td>{{ event[2] }}</td>
<td>{{ event[3] }}</td>
<td>{{ event[6] }}</td>
<td>₹{{ event[8] }}</td>
<td>{{ event[7] }}</td>

<td>

<a href="/payment/{{ event[0] }}" class="btn btn-success btn-sm">
    Register
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/student_dashboard" class="btn btn-secondary">
Back
</a>

</div>

</div>

</body>
</html>
