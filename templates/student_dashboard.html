<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.card-option{
transition:0.3s;
cursor:pointer;
}

.card-option:hover{
transform:scale(1.05);
box-shadow:0px 8px 20px rgba(0,0,0,0.2);
}

.icon{
font-size:45px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="text-center mb-4">

<h2 class="text-success">
🎓 Student Dashboard
</h2>

<p class="text-muted">
Welcome to Smart Campus Event Management System
</p>

</div>

<div class="row g-4">

<div class="col-md-6">

<a href="/student_events" class="text-decoration-none">

<div class="card card-option shadow text-center p-4">

<div class="icon">
📅
</div>

<h4 class="mt-3 text-primary">
Available Events
</h4>

<p class="text-muted">
Register for upcoming events
</p>

</div>

</a>

</div>

<div class="col-md-6">

<a href="/my_registrations" class="text-decoration-none">

<div class="card card-option shadow text-center p-4">

<div class="icon">
📝
</div>

<h4 class="mt-3 text-success">
My Registrations
</h4>

<p class="text-muted">
View registered events
</p>

</div>

</a>

</div>

<div class="col-md-6">

<a href="/student_profile" class="text-decoration-none">

<div class="card card-option shadow text-center p-4">

<div class="icon">
👤
</div>

<h4 class="mt-3 text-info">
My Profile
</h4>

<p class="text-muted">
View your profile details
</p>

</div>

</a>

</div>

<div class="col-md-6">

<a href="/" class="text-decoration-none">

<div class="card card-option shadow text-center p-4">

<div class="icon">
🚪
</div>

<h4 class="mt-3 text-danger">
Logout
</h4>

<p class="text-muted">
Sign out securely
</p>

</div>

</a>

</div>

</div>

<div class="text-center mt-5">

<hr>

<p class="text-secondary">
© 2027 Smart Campus Event Management System
</p>

</div>

</div>

</body>
</html>
