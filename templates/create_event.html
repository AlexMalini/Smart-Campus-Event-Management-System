<!DOCTYPE html>
<html>
<head>
    <title>Create Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-primary text-center">Create New Event</h2>

<form method="POST">

<input type="text" class="form-control mt-3"
name="event_name"
placeholder="Event Name" required>

<input type="text" class="form-control mt-3"
name="event_type"
placeholder="Event Type" required>

<input type="date" class="form-control mt-3"
name="event_date" required>

<input type="text" class="form-control mt-3"
name="venue"
placeholder="Venue" required>

<input type="text" class="form-control mt-3"
name="organizer"
placeholder="Organizer" required>

<div class="mb-3">
    <label class="form-label">
        Registration Fee (₹)
    </label>

    <input
        type="number"
        name="registration_fee"
        class="form-control"
        placeholder="Enter Registration Fee"
        min="0"
        required>
</div>

<input type="number" class="form-control mt-3"
name="max_participants"
placeholder="Maximum Participants" required>

<textarea class="form-control mt-3"
name="description"
placeholder="Event Description"></textarea>

<button class="btn btn-success w-100 mt-4">
Create Event
</button>

</form>

</div>

</div>

</body>
</html>
