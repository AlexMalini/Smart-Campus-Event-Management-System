<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
            font-family:Arial,sans-serif;
        }

        .card{
            width:420px;
            margin:80px auto;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>

<div class="card">

<h2 class="text-center text-primary">
📧 Email Verification
</h2>

<p class="text-center text-muted">
A 6-digit verification code has been sent to your registered email. Please enter it below.
</p>

<p class="text-center text-danger fw-bold" id="timer">
⏳ OTP expires in: 05:00
</p>

<form method="POST">

<input
type="text"
name="otp"
class="form-control mt-3"
placeholder="Enter 6-digit OTP"
required>

<button
class="btn btn-primary w-100 mt-4">

Verify OTP

</button>

<div class="text-center mt-3">

    <a href="/resend_otp"
       class="btn btn-outline-primary">

        🔄 Resend OTP

    </a>

</div>

</form>

<div class="text-center mt-3">
    <a href="/student_login" class="text-decoration-none">
        ← Back to Login
    </a>
</div>

</div>

<script>

let timeLeft = 300; // 300 seconds = 5 minutes

const timer = document.getElementById("timer");

const countdown = setInterval(function () {

    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    if (seconds < 10) {
        seconds = "0" + seconds;
    }

    timer.innerHTML = "⏳ OTP expires in: " + minutes + ":" + seconds;

    timeLeft--;

    if (timeLeft < 0) {
        clearInterval(countdown);

        timer.innerHTML = "❌ OTP Expired";

        timer.classList.remove("text-danger");
        timer.classList.add("text-danger");
    }

}, 1000);

</script>

</body>
</html>
