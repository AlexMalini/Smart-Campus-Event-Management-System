<!DOCTYPE html>
<html>
<head>

    <title>Event Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4" style="max-width:600px; margin:auto;">

        <h2 class="text-center text-primary">
            💳 Event Registration Payment
        </h2>

        <hr>

        <h4>{{ event[1] }}</h4>

        <p><strong>Event Type:</strong> {{ event[5] }}</p>

        <p><strong>Venue:</strong> {{ event[3] }}</p>

        <p><strong>Organizer:</strong> {{ event[6] }}</p>

        <h3 class="text-success">
            Registration Fee : ₹ {{ event[8] }}
        </h3>

        <form action="/payment_success/{{ event[0] }}" method="POST">

            <button class="btn btn-success w-100 mt-3">
                Pay Now
            </button>

        </form>

        <a href="/student_events" class="btn btn-secondary w-100 mt-3">
            Cancel
        </a>

    </div>

</div>

</body>
</html>
