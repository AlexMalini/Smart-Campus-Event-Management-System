<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center text-warning">
✏ Edit Profile
</h2>

<form method="POST">

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{ student[0] }}" required>
</div>

<div class="mb-3">
<label>Department</label>
<input type="text" name="department" class="form-control" value="{{ student[1] }}" required>
</div>

<div class="mb-3">
<label>Year</label>
<input type="text" name="year" class="form-control" value="{{ student[2] }}" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" value="{{ student[3] }}" required>
</div>

<button type="submit" class="btn btn-success">
Save Changes
</button>

<a href="/student_profile" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>
</html>
