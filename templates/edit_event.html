<!DOCTYPE html>
<html>
<head>
    <title>Edit Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center text-warning">Edit Event</h2>

<form method="POST">

<input type="text" class="form-control mt-3"
name="event_name"
value="{{ event[1] }}"
required>

<input type="text" class="form-control mt-3"
name="event_type"
value="{{ event[2] }}"
required>

<input type="date" class="form-control mt-3"
name="date"
value="{{ event[3] }}"
required>

<input type="text" class="form-control mt-3"
name="venue"
value="{{ event[4] }}"
required>

<input type="text" class="form-control mt-3"
name="organizer"
value="{{ event[5] }}"
required>

<input type="number" class="form-control mt-3"
name="participants"
value="{{ event[6] }}"
required>

<textarea class="form-control mt-3"
name="description">{{ event[7] }}</textarea>

<button class="btn btn-warning w-100 mt-4">
Update Event
</button>

</form>

</div>

</div>

</body>
</html>
